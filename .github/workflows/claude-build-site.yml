name: Claude Site Builder

on:
  issues:
    types: [labeled]

jobs:
  build-site:
    # Only run when 'claude-build' label is added
    if: github.event.label.name == 'claude-build'
    runs-on: ubuntu-latest

    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write  # Required for OIDC

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # AWS OIDC Authentication (recommended for SSO environments)
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: claude-site-builder
          aws-region: us-east-1

      - name: Install Claude Code
        run: |
          curl -fsSL https://claude.ai/install.sh | bash
          echo "$HOME/.claude/bin" >> $GITHUB_PATH

      - name: Build Site with Claude
        env:
          CLAUDE_CODE_USE_BEDROCK: "1"
          AWS_REGION: us-east-1
          ANTHROPIC_MODEL: "us.anthropic.claude-sonnet-4-6-20250514-v1:0"
        run: |
          claude -p "
          A new site build has been requested via GitHub Issue #${{ github.event.issue.number }}.

          ## Issue Title
          ${{ github.event.issue.title }}

          ## Issue Body
          ${{ github.event.issue.body }}

          ## Your Task

          1. Parse the issue body to extract site configuration:
             - Site Name
             - Site Slug (lowercase, no spaces, used for folder name and URLs)
             - Primary Color (hex)
             - Secondary Color (hex, optional)
             - Phone Number
             - Email
             - Address, City, State, ZIP
             - Any other provided fields

          2. Create the site folder and files:
             - Create sites/{slug}/config.json with the site configuration (use sites/pinecrest/config.json as reference)
             - Create sites/{slug}/content.json with default content (use sites/pinecrest/content.json as reference)
             - Create sites/{slug}/assets/ folder
             - Create a simple logo.svg and logo-dark.svg with the site name

          3. IMPORTANT: Only create/modify files in the sites/ directory. Never modify templates or src/ files.

          4. After creating the files, stage and commit the changes with message: 'Add new site: {site name}'

          5. Push the changes to the repository.
          " \
          --allowedTools "Read,Write,Bash(git add *),Bash(git commit *),Bash(git push *),Bash(mkdir *)" \
          --max-turns 15

      - name: Build all sites
        run: npm run build

      - name: Comment on Issue - Success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Site Created! ✅\n\nClaude has created the site configuration.\n\n**Next Steps:**\n1. Review the generated files in the \`sites/\` folder\n2. Set up Vercel deployment if needed\n3. Close this issue when complete`
            })

            github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['site-created']
            })

      - name: Comment on Issue - Failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Build Failed ❌\n\nThe site build encountered an error. Please check the [workflow logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.\n\nCommon issues:\n- Missing required fields in the issue\n- Invalid color format (use hex like #2a5d4f)\n- AWS OIDC role not configured`
            })

            github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['build-failed']
            })
