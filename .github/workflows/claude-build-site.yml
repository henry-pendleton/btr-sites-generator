name: Claude Site Builder

on:
  issues:
    types: [labeled]

jobs:
  build-site:
    # Only run when 'claude-build' label is added
    if: github.event.label.name == 'claude-build'
    runs-on: ubuntu-latest

    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Claude Code
        run: |
          curl -fsSL https://claude.ai/install.sh | bash
          echo "$HOME/.claude/bin" >> $GITHUB_PATH

      - name: Build Site with Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude -p "
          Create a new BTR site from this GitHub Issue. Read sites/pinecrest/ as reference, then create the new site.

          ## Issue Data
          ${{ github.event.issue.body }}

          ## Instructions
          1. Read sites/pinecrest/config.json and sites/pinecrest/content.json as templates
          2. Create sites/{slug}/config.json with site data from issue (name, slug, colors, contact, etc)
          3. Create sites/{slug}/content.json with default content (copy pinecrest structure, update text)
          4. Create sites/{slug}/assets/logo.svg and logo-dark.svg (simple text SVGs with site name)
          5. Run: git add sites/ && git commit -m 'Add new site: {name}' && git push

          Only modify files in sites/ directory. Be efficient - minimize tool calls.
          " \
          --allowedTools "Read,Write,Bash(git *),Bash(mkdir *)" \
          --max-turns 25

      - name: Build all sites
        run: npm run build

      - name: Comment on Issue - Success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Site Created! ✅\n\nClaude has created the site configuration.\n\n**Next Steps:**\n1. Review the generated files in the \`sites/\` folder\n2. Set up Vercel deployment if needed\n3. Close this issue when complete`
            })

            github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['site-created']
            })

      - name: Comment on Issue - Failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Build Failed ❌\n\nThe site build encountered an error. Please check the [workflow logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.\n\nCommon issues:\n- Missing required fields in the issue\n- Invalid color format (use hex like #2a5d4f)\n- ANTHROPIC_API_KEY secret not configured`
            })

            github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['build-failed']
            })
